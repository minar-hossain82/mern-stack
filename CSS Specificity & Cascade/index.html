<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Specificity Demo</title>

    <style>
      /* Element selector */
      h1 {
        color: aqua;
      }

      /* Class selector */
      .cpurple {
        color: purple;
      }

      /* Element + class selector */
      h1.yellow {
        color: yellow;
      }

      /* Attribute selector */
      [data-x="a"] {
        color: maroon;
      }

      /* Class selector */
      .cred {
        color: red;
      }

      /* Complex selector with pseudo-class */
      a.harryclass.rohan-class[href]:hover {
        color: blueviolet;
      }
    </style>
  </head>

  <body>
    <div>
      <h1 class="yellow cred cpurple" data-x="a">CSS Specificity</h1>
    </div>
  </body>
</html>
