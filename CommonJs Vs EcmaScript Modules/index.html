<!DOCTYPE html>
<!-- Defines the document type as HTML5 -->
<html lang="en">
  <!-- Sets the language of the page to English -->
  <head>
    <meta charset="UTF-8" />
    <!-- Uses UTF-8 character encoding -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Enables responsive design on all devices -->
    <title>Document</title>
    <!-- Title displayed on the browser tab -->
  </head>
  <body>
    <!-- Importing ES module: contains reusable exported functions or variables -->
    <script type="module" src="mymodule.js"></script>

    <!-- Main script file: imports functions from mymodule.js and executes main logic -->
    <script type="module" src="main.js"></script>
  </body>
</html>
