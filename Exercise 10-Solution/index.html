<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // Generate a random number between 0 (inclusive) and 1 (exclusive)
      let rand = Math.random();

      // Declare variables to hold the three words
      let first, second, third;

      // rand ranges: 0-0.33, 0.33-0.66, 0.66-1

      // Generate the first word based on the random number
      if (rand < 0.33) {
        first = "Crazy";
      } else if (rand < 0.66 && rand >= 0.33) {
        first = "Amazing";
      } else {
        first = "Fire";
      }

      // Generate the second word using a new random number
      rand = Math.random();
      if (rand < 0.33) {
        second = "Engine";
      } else if (rand < 0.66 && rand >= 0.33) {
        second = "Foods";
      } else {
        second = "Garments";
      }

      // Generate the third word using another new random number
      rand = Math.random();
      if (rand < 0.33) {
        third = "Bros";
      } else if (rand < 0.66 && rand >= 0.33) {
        third = "Limited";
      } else {
        third = "Hub";
      }

      // Combine the three words and print them in the console
      console.log(`${first} ${second} ${third}`);
    </script>
  </body>
</html>
