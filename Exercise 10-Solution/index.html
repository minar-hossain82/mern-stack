<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8" />

    <!-- Makes the page responsive on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title -->
    <title>Document</title>
  </head>
  <body>
    <script>
      // Generate a random decimal number between 0 (inclusive) and 1 (exclusive)
      let rand = Math.random();

      // Variables to store three parts of the company name
      let first, second, third;

      // -------- First word selection --------
      // Decide the first word based on the random number range
      if (rand < 0.33) {
        first = "Crazy";
      } else if (rand >= 0.33 && rand < 0.66) {
        first = "Amazing";
      } else {
        first = "Fire";
      }

      // -------- Second word selection --------
      // Generate a new random number for the second word
      rand = Math.random();

      if (rand < 0.33) {
        second = "Engine";
      } else if (rand >= 0.33 && rand < 0.66) {
        second = "Foods";
      } else {
        second = "Garments";
      }

      // -------- Third word selection --------
      // Generate another random number for the third word
      rand = Math.random();

      if (rand < 0.33) {
        third = "Bros";
      } else if (rand >= 0.33 && rand < 0.66) {
        third = "Limited";
      } else {
        third = "Hub";
      }

      // Combine all three words into one string
      // and print the result in the browser console
      console.log(`${first} ${second} ${third}`);
    </script>
  </body>
</html>
