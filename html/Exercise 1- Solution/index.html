<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Media Playlist</title>
  </head>

  <body>
    <main>
      <h1>My Videos and Audios for the Day</h1>

      <section>
        <h2>Videos</h2>
        <div>
          <video width="240" controls preload="metadata">
            <source src="1.mp4" type="video/mp4" />
          </video>

          <video width="240" controls preload="metadata">
            <source src="2.mp4" type="video/mp4" />
          </video>

          <video width="240" controls preload="metadata">
            <source src="3.mp4" type="video/mp4" />
          </video>

          <video width="240" controls preload="metadata">
            <source src="4.mp4" type="video/mp4" />
          </video>

          <video width="240" controls preload="metadata">
            <source src="5.mp4" type="video/mp4" />
          </video>
        </div>
      </section>

      <section>
        <h2>Audios</h2>
        <div>
          <audio controls preload="metadata">
            <source src="1.mp3" type="audio/mpeg" />
          </audio>

          <audio controls preload="metadata">
            <source src="2.mp3" type="audio/mpeg" />
          </audio>

          <audio controls preload="metadata">
            <source src="3.mp3" type="audio/mpeg" />
          </audio>

          <audio controls preload="metadata">
            <source src="4.mp3" type="audio/mpeg" />
          </audio>

          <audio controls preload="metadata">
            <source src="5.mp3" type="audio/mpeg" />
          </audio>
        </div>
      </section>
    </main>
  </body>
</html>
