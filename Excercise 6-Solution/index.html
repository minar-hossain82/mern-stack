<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character encoding -->
    <meta charset="UTF-8" />

    <!-- Responsive design for different screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title -->
    <title>Document</title>

    <style>
      /* Logo container */
      .logo {
        /* Currently no styles applied */
      }

      /* Logo image size */
      .logo img {
        width: 164px;
      }

      /* Navigation bar styling */
      nav {
        display: flex; /* Align items in a row */
        justify-content: space-around; /* Space items evenly */
        align-items: center; /* Center items vertically */
        font-family: "Segoe UI"; /* Set font */
      }

      /* Right side menu list */
      .right ul {
        display: flex; /* Display menu items horizontally */
        gap: 34px; /* Space between menu items */
      }

      /* Individual menu items */
      .right ul li {
        list-style: none; /* Remove bullet points */
        display: flex; /* Align text and icon */
        align-items: center; /* Vertically center content */
        cursor: pointer; /* Pointer cursor on hover */
      }

      /* Spacing between text and dropdown icon */
      .right ul li span {
        padding: 0 5px;
      }
    </style>
  </head>

  <body>
    <!-- Header section -->
    <header>
      <!-- Navigation bar -->
      <nav>
        <!-- Logo section -->
        <div class="logo">
          <img
            src="https://www.ultraedit.com/wp-content/uploads/2023/01/Dark-logo.png"
            alt="UltraEdit Logo"
          />
        </div>

        <!-- Right navigation menu -->
        <div class="right">
          <ul>
            <!-- Products menu item -->
            <li>
              <span>Products</span>
              <!-- Dropdown arrow icon -->
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M6 9L11.2929 14.2929C11.6262 14.6262 11.7929 14.7929 12 14.7929C12.2071 14.7929 12.3738 14.6262 12.7071 14.2929L18 9"
                  stroke="#141B34"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </li>

            <!-- Pricing menu item -->
            <li>
              <span>Pricing</span>
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M6 9L11.2929 14.2929C11.6262 14.6262 11.7929 14.7929 12 14.7929C12.2071 14.7929 12.3738 14.6262 12.7071 14.2929L18 9"
                  stroke="#141B34"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </li>

            <!-- Resources menu item -->
            <li>
              <span>Resources</span>
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M6 9L11.2929 14.2929C11.6262 14.6262 11.7929 14.7929 12 14.7929C12.2071 14.7929 12.3738 14.6262 12.7071 14.2929L18 9"
                  stroke="#141B34"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </li>

            <!-- About Us menu item -->
            <li>
              <span>About Us</span>
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M6 9L11.2929 14.2929C11.6262 14.6262 11.7929 14.7929 12 14.7929C12.2071 14.7929 12.3738 14.6262 12.7071 14.2929L18 9"
                  stroke="#141B34"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </li>

            <!-- Language selector icon -->
            <li>
              <img
                src="https://www.ultraedit.com/wp-content/themes/Divi_Child/img/Lang.png"
                alt="Language Selector"
              />
            </li>
          </ul>
        </div>
      </nav>
    </header>
  </body>
</html>
