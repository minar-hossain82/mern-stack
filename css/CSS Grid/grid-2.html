<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Grid Layout</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      .container {
        display: grid;
        grid-template-areas:
          "nav nav nav"
          "side article article"
          "footer footer footer";
        gap: 10px;
        border: 2px solid #000;
        padding: 10px;
      }

      .item {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 55px;
        border: 2px solid red;
        font-weight: bold;
      }

      .item-1 {
        grid-area: nav;
        background-color: aqua;
      }

      .item-2 {
        grid-area: side;
        background-color: beige;
      }

      .item-3 {
        grid-area: article;
        background-color: azure;
      }

      .item-4 {
        grid-area: footer;
        background-color: lightgray;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="item item-1">Nav</div>
      <div class="item item-2">Sidebar</div>
      <div class="item item-3">Article</div>
      <div class="item item-4">Footer</div>
    </div>
  </body>
</html>
