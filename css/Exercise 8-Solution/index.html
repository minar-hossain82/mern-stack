<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Bouncing ball animation using HTML and CSS"
    />
    <title>Bouncing Ball Animation</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f4f4f4;
        font-family: Arial, sans-serif;
      }

      .container {
        position: relative;
        width: 80vw;
        height: 80vh;
        overflow: hidden;
        border-radius: 12px;
        background-color: #1d4ed8;
      }

      .ball {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background-color: #ef4444;

        animation:
          moveX 4s linear infinite,
          bounceY 1s ease-in-out infinite alternate;
      }

      @keyframes moveX {
        from {
          left: 0;
        }

        to {
          left: calc(100% - 120px);
        }
      }

      @keyframes bounceY {
        from {
          bottom: 0;
        }

        to {
          bottom: calc(100% - 120px);
        }
      }
    </style>
  </head>

  <body>
    <main class="container">
      <div class="ball"></div>
    </main>
  </body>
</html>
