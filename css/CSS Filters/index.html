<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Filters Demo</title>

    <style>
      /* Reset */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        display: flex;
        gap: 20px;
        padding: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .container img {
        width: 300px;
        height: auto;
        border-radius: 8px;
        object-fit: cover;
        transition: filter 0.3s ease;
      }

      /* Filters */
      .img-bright {
        filter: brightness(1.22);
      }

      .img-gray {
        filter: grayscale(0.2);
      }

      /* Optional hover effect */
      .container img:hover {
        filter: none;
      }
    </style>
  </head>

  <body>
    <main class="container">
      <img
        class="img-bright"
        src="https://img.freepik.com/free-photo/programming-background-with-person-working-with-codes-computer_23-2150010125.jpg"
        alt="Person programming on a computer"
        loading="lazy"
      />

      <img
        src="https://c.ndtvimg.com/2023-09/154fgjlg_shah-rukh-khan-_625x300_23_September_23.jpg"
        alt="Shah Rukh Khan portrait"
        loading="lazy"
      />

      <img
        class="img-gray"
        src="https://images.hindustantimes.com/img/2022/11/12/550x309/akshay_kumar_1659860706633_1668255913307_1668255913307.jpg"
        alt="Akshay Kumar portrait"
        loading="lazy"
      />
    </main>
  </body>
</html>
