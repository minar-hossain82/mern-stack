<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Transform Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="wrap">
      <section class="box"><div class="blue scaleX">scaleX</div></section>
      <section class="box"><div class="blue scaleY">scaleY</div></section>
      <section class="box"><div class="blue scale">scale</div></section>

      <section class="box">
        <div class="blue translateX">translateX</div>
      </section>
      <section class="box">
        <div class="blue translateY">translateY</div>
      </section>
      <section class="box"><div class="blue translate">translate</div></section>

      <section class="box"><div class="blue matrix">matrix</div></section>
      <section class="box"><div class="blue rotate">rotate</div></section>

      <section class="box"><div class="blue skew">skew</div></section>
      <section class="box"><div class="blue skewX">skewX</div></section>
      <section class="box"><div class="blue skewY">skewY</div></section>

      <section class="box"><div class="blue matrix3d">matrix3d</div></section>
      <section class="box">
        <div class="blue translate3d">translate3d</div>
      </section>

      <section class="box"><div class="blue rotateY">rotateY</div></section>
      <section class="box"><div class="blue rotateX">rotateX</div></section>
      <section class="box">
        <div class="blue translateZ">translateZ</div>
      </section>
    </main>
  </body>
</html>
