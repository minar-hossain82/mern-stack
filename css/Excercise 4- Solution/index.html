<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CSS MultiColor Website using CSS variables"
    />
    <title>CSS MultiColor Website</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary-color: #061872cc;
        --secondary-color: #6ea5fccc;
        --text-color: #ffffff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background-color: var(--secondary-color);
      }

      header {
        width: 100%;
      }

      nav {
        background-color: var(--primary-color);
      }

      nav ul {
        display: flex;
        justify-content: center;
        list-style: none;
      }

      nav ul li {
        padding: 15px 20px;
        font-weight: 500;
      }

      nav ul li a {
        color: var(--text-color);
        text-decoration: none;
        transition:
          opacity 0.3s ease,
          transform 0.2s ease;
      }

      nav ul li a:hover {
        opacity: 0.7;
        transform: translateY(-2px);
      }
    </style>
  </head>

  <body>
    <header>
      <nav>
        <ul>
          <li><a href="#" aria-label="Home">Home</a></li>
          <li><a href="#" aria-label="About">About</a></li>
          <li><a href="#" aria-label="Services">Services</a></li>
          <li><a href="#" aria-label="Contact Us">Contact Us</a></li>
        </ul>
      </nav>
    </header>
  </body>
</html>
