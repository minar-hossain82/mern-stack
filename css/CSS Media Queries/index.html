<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Layout with Media Queries</title>

    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background-color: red;
        padding: 20px;
        line-height: 1.5;
      }

      .boxes {
        display: flex;
        gap: 8px;
        margin-top: 20px;
      }

      .box {
        flex: 1;
        min-width: 200px;
        height: 300px;
        background-color: steelblue;
        border-radius: 6px;
      }

      @media (orientation: portrait) {
        body {
          border: 2px solid purple;
        }
      }

      @media (max-width: 455px) {
        body {
          background-color: blue;
        }

        .boxes {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <div class="intro">Hey, I am a responsive layout example!</div>

    <div class="boxes">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
