<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>

    <style>
        /* Reset default spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Sticky header */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            background-color: pink;
            height: 83px;
        }

        main {
            background-color: black;
            color: white;
            padding: 34px;
        }

        .container {
            background-color: green;
            margin: 12px 34px;
            padding: 55px 23px;
            text-align: center;
        }

        .box1,
        .box2 {
            height: 70vh;
            width: 45%;
            display: inline-block;
            margin: 0 12px;
        }

        .box1 {
            background-color: palevioletred;
        }

        .box2 {
            background-color: blue;
        }

        .text-box {
            padding: 34px;
            border: 2px solid white;
            margin: 50px auto;
            width: fit-content;
            font-size: 2em;
            border-radius: 13px;
            text-align: center;
        }

        /* Floating button */
        .orange-box {
            height: 32px;
            width: 32px;
            background: orange;
            position: fixed;
            bottom: 12px;
            right: 23px;
            border-radius: 50%;
        }

        footer {
            height: 100px;
            background-color: bisque;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <nav></nav>
    </header>

    <!-- Main Content -->
    <main>
        <section class="container">
            <div class="box1"></div>
            <div class="box2"></div>
        </section>

        <section class="text-box">
            <p>Welcome to Sigma Web Development Express</p>
        </section>

        <div class="orange-box"></div>
    </main>

    <!-- Footer -->
    <footer></footer>

</body>

</html>
