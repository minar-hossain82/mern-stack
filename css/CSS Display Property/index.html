<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Display Property Demo</title>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.5;
        padding: 20px;
      }

      .box {
        display: inline-block;
        width: 344px;
        padding: 45px;
        margin: 34px;
        border: 2px solid blue;
        text-align: center;
      }

      span {
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <div class="box">I am a box</div>
    <div class="box">Also a nice box</div>

    <span>I am a good </span>
    <span>boy</span>
  </body>
</html>
