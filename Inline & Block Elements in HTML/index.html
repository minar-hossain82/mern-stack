<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inline and Block Elements - HTML</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Paragraph is a block-level element -->
    <p>Hey I am a para</p>

    <!-- Anchor tag is an inline element -->
    <a href="https://google.com">Google</a>

    <!-- Div is a block-level element, takes full width by default -->
    <div>I am a block element</div>

    <!-- Span is an inline element, does not start on a new line -->
    <span>I am span and I am inline</span>

    <!-- Another example of inline element -->
    <a href="">yes he is inline</a>

    <!-- Quick Quiz:
         Create a vertically aligned form asking for Name, City, and Pincode
         without using <br> tags. Use block elements or CSS for spacing.
         Make sure to comment your code. -->
  </body>
</html>
