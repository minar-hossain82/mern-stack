<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta information -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title -->
    <title>Download UltraEdit text editor for Windows</title>

    <!-- External CSS file -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Header section with navigation bar -->
    <header>
      <nav>
        <!-- Website logo -->
        <div class="logo">
          <img
            src="https://www.ultraedit.com/wp-content/uploads/2023/01/Dark-logo.png"
            alt=""
          />
        </div>

        <!-- Right side navigation menu -->
        <div class="right">
          <ul>
            <!-- Products dropdown -->
            <li>
              <span>Products </span>
              <!-- Dropdown arrow icon -->
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M6 9L11.2929 14.2929C11.6262 14.6262 11.7929 14.7929 12 14.7929C12.2071 14.7929 12.3738 14.6262 12.7071 14.2929L18 9"
                  stroke="#141B34"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </li>

            <!-- Pricing dropdown -->
            <li>
              <span>Pricing </span>
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M6 9L11.2929 14.2929C11.6262 14.6262 11.7929 14.7929 12 14.7929C12.2071 14.7929 12.3738 14.6262 12.7071 14.2929L18 9"
                  stroke="#141B34"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </li>

            <!-- Resources dropdown -->
            <li>
              <span>Resources </span>
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M6 9L11.2929 14.2929C11.6262 14.6262 11.7929 14.7929 12 14.7929C12.2071 14.7929 12.3738 14.6262 12.7071 14.2929L18 9"
                  stroke="#141B34"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </li>

            <!-- About Us dropdown -->
            <li>
              <span>About Us </span>
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M6 9L11.2929 14.2929C11.6262 14.6262 11.7929 14.7929 12 14.7929C12.2071 14.7929 12.3738 14.6262 12.7071 14.2929L18 9"
                  stroke="#141B34"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </li>

            <!-- Language icon -->
            <li>
              <img
                src="https://www.ultraedit.com/wp-content/themes/Divi_Child/img/Lang.png"
                alt=""
              />
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <main>
      <!-- First section: Main heading + description + button -->
      <section class="first">
        <!-- Main title with logo -->
        <span>
          Download <b>UltraEdit</b> for Windows
          <img
            width="34"
            src="https://www.ultraedit.com/wp-content/uploads/2022/10/Reviews.png"
            alt=""
          />
        </span>

        <!-- Description text -->
        <p>
          Download and try UltraEdit before you buy it! This download includes
          the full Windows version of the text editor.
        </p>

        <!-- Download button -->
        <div>
          <button class="btn">DOWNLOAD MAC OR LINUX VERSION</button>
        </div>
      </section>

      <!-- Second section: Download options -->
      <section class="second">
        <!-- UltraEdit version info header -->
        <div class="download">
          <img
            src="https://www.ultraedit.com/wp-content/uploads/2022/11/UE.png"
            alt=""
          />
          <span>Download UltraEdit </span>
          <span class="small">v2023.1 (released 08/16/2023) | Hotfix</span>
        </div>

        <!-- Grid for language download cards -->
        <div class="grid">
          <!-- Repeated language item (English) -->
          <!-- You can replace "English" with other languages later -->
          <div class="item">
            <div class="item-lang">English</div>

            <!-- 32-bit download button -->
            <button class="btn blue">
              <a href="/ue_english.exe">Download 32-bit</a>
            </button>

            <!-- 64-bit download button -->
            <button class="btn blue">
              <a href="/ue_english.exe">Download 64-bit</a>
            </button>
          </div>

          <!-- All other blocks below are identical copies -->
          <!-- Each represents a different language or same language multiple times -->
        </div>
      </section>
    </main>
  </body>
</html>
