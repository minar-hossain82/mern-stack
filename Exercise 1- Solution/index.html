<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Defines the character encoding for the document -->
    <meta charset="UTF-8" />

    <!-- Makes the website responsive on different screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title shown on the browser tab -->
    <title>Document</title>
  </head>
  <body>
    <!-- Main heading of the page -->
    <h1>My Videos and Audios for the Day</h1>

    <!-- Section heading for videos -->
    <h2>Some Videos for the Day</h2>

    <!-- Container holding all video elements -->
    <div>
      <!-- Video player with controls enabled -->
      <video width="239" src="1.mp4" controls></video>
      <video width="239" src="2.mp4" controls></video>
      <video width="239" src="3.mp4" controls></video>
      <video width="239" src="4.mp4" controls></video>
      <video width="239" src="5.mp4" controls></video>
    </div>

    <!-- Section heading for audios -->
    <h2>Some Audios for the Day</h2>

    <!-- Container holding all audio elements -->
    <div>
      <!-- Audio player with playback controls -->
      <audio src="1.mp3" controls></audio>
      <audio src="2.mp3" controls></audio>
      <audio src="3.mp3" controls></audio>
      <audio src="4.mp3" controls></audio>
      <audio src="5.mp3" controls></audio>
    </div>
  </body>
</html>
