<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bouncing Ball Animation</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f4f4f4;
        font-family: Arial, sans-serif;
      }

      .container {
        position: relative;
        width: 80vw;
        height: 80vh;
        background-color: blue;
        overflow: hidden;
      }

      .box {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 120px;
        height: 120px;
        background-color: red;
        border-radius: 50%;

        animation:
          animateX 3s linear infinite,
          animateY 1s ease-out infinite alternate;
      }

      @keyframes animateX {
        from {
          left: 0;
        }
        to {
          left: 100%;
        }
      }

      @keyframes animateY {
        from {
          bottom: 0;
        }
        to {
          bottom: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="box"></div>
    </div>
  </body>
</html>
