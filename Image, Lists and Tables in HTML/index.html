<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Images</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Displaying an image of a train with specified height -->
    <img height="230" src="image.png" alt="Train image" />
    <br />

    <!-- Employee details table -->
    <table>
      <caption>
        Employee Details
      </caption>
      <!-- Table title/caption -->
      <thead>
        <tr>
          <th>Name</th>
          <th>Designation</th>
          <th>Fav Language</th>
        </tr>
      </thead>
      <tbody>
        <!-- Normal row with employee details -->
        <tr>
          <td>Harry</td>
          <td>Programmer</td>
          <td>JavaScript</td>
        </tr>

        <!-- Row with colspan and rowspan to merge cells -->
        <tr>
          <td colspan="2">Sam</td>
          <!-- Merged two columns for Sam's name and designation -->
          <td rowspan="2">Java</td>
          <!-- Java spans two rows -->
        </tr>
        <tr>
          <td colspan="2">Sam</td>
          <!-- Repeated row for demonstration -->
        </tr>
      </tbody>
      <tfoot>
        <!-- Footer row with colspan and rowspan -->
        <tr>
          <td colspan="2">Sam</td>
          <td rowspan="2">foot</td>
        </tr>
      </tfoot>
    </table>

    <!-- Unordered list with square bullets -->
    <ul type="square">
      <li>Harry</li>
      <li>Rohan</li>
      <li>Shubham</li>
    </ul>

    <!-- Ordered list with uppercase letters -->
    <ol type="A">
      <li>Harry</li>
      <li>Rohan</li>
      <li>Shubham</li>
    </ol>
  </body>
</html>
