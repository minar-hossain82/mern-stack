<!DOCTYPE html>
<!-- Defines the document type as HTML5 -->
<html lang="en">
  <head>
    <!-- Sets the character encoding to UTF-8 -->
    <meta charset="UTF-8" />

    <!-- Makes the page responsive on all screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title displayed on the browser tab -->
    <title>JavaScript Introduction</title>
  </head>
  <body>
    <!-- A div element with class 'box' -->
    <div class="box">
      <!-- Text content inside the box -->
      Hey I am a Box
    </div>

    <!-- A button element -->
    <button>Submit</button>

    <!-- Links the external JavaScript file -->
    <script src="script.js"></script>
  </body>
</html>
