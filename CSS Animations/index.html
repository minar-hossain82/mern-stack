<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced CSS Animation</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        font-family: Arial, sans-serif;
      }

      .container {
        width: 320px;
        height: 80vh;
        background-color: #096a6a;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      .box {
        width: 60px;
        height: 60px;
        background-color: red;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.3s ease;
        animation:
          colorShift 2s ease-in-out 1s forwards,
          rotateBox 3s ease-in-out 1s forwards;
      }

      .box:hover {
        transform: scale(1.2);
      }

      @keyframes colorShift {
        0% {
          background-color: #ff4d4d;
        }
        100% {
          background-color: #ffd700;
        }
      }

      @keyframes rotateBox {
        0% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(120deg);
        }
        50% {
          transform: rotate(200deg);
        }
        75% {
          transform: rotate(280deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">Box</div>
    </div>
  </body>
</html>
