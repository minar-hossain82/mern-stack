<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Animations</title>
    <style>
      /* Container div to hold the box */
      .container {
        background-color: rgb(9, 106, 106); /* Dark teal background */
        height: 80vh; /* 80% of viewport height */
        width: 30vw; /* 30% of viewport width */
      }

      /* The animated box inside the container */
      .box {
        width: 34px; /* Box width */
        height: 45px; /* Box height */

        /* Multiple animations applied to the box */
        /* Format: animation: name duration timing-function delay iteration-count direction fill-mode; */
        animation: harryKaAnimation 2s ease-in-out 3s 1,
          /* First animation: color change */ harry2 3s ease-in-out 3s 1; /* Second animation: rotation */
      }

      /* Animation for changing background color */
      @keyframes harryKaAnimation {
        from {
          background-color: red; /* Start with red */
        }
        to {
          background-color: yellow; /* End with yellow */
        }
      }

      /* Animation for rotating the box */
      @keyframes harry2 {
        0% {
          transform: rotate(100deg); /* Start at 100 degrees */
        }
        20% {
          transform: rotate(200deg); /* Rotate to 200 degrees */
        }
        50% {
          transform: rotate(220deg); /* Rotate to 220 degrees */
        }
        80% {
          transform: rotate(300deg); /* Rotate to 300 degrees */
        }
        100% {
          transform: rotate(310deg); /* End at 310 degrees */
        }
      }
    </style>
  </head>
  <body>
    <!-- Main container -->
    <div class="container">
      <!-- Box that will animate -->
      <div class="box">Box</div>
    </div>
  </body>
</html>
