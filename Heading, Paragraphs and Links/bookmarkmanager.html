<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Specifies the character encoding for the document -->
    <meta charset="UTF-8" />

    <!-- Ensures proper rendering and touch zooming on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title of the webpage shown in the browser tab -->
    <title>Bookmark Manager - CodeWithHarry</title>
  </head>
  <body>
    <!-- Main heading of the page -->
    <h1>My Bookmarks - CodeWithHarry</h1>

    <!-- Section for primary bookmarks -->
    <h2>Primary Bookmarks</h2>

    <!-- Each paragraph contains a bookmark link -->
    <!-- target="_blank" opens the link in a new tab -->
    <p><a target="_blank" href="https://www.google.com">Open Google</a></p>
    <p><a target="_blank" href="https://www.facebook.com">Open Facebook</a></p>
    <p><a target="_blank" href="https://www.quora.com">Open Quora</a></p>
    <p>
      <a target="_blank" href="https://www.codewithharry.com"
        >Open CodeWithHarry</a
      >
    </p>
    <p><a target="_blank" href="https://www.youtube.com">Open YouTube</a></p>

    <!-- Section for secondary bookmarks -->
    <h2>Secondary Bookmarks</h2>

    <!-- Additional useful links -->
    <p>
      <a target="_blank" href="https://www.wikipedia.com">Open Wikipedia</a>
    </p>
    <p>
      <a target="_blank" href="https://www.stackoverflow.com"
        >Open Stackoverflow</a
      >
    </p>
  </body>
</html>
