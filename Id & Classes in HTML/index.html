<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8" />

    <!-- Makes the page responsive on different screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title shown in the browser tab -->
    <title>ID and Classes in HTML</title>

    <!-- External CSS file linked to style the page -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 
        A div element with:
        - id="firstdiv" (unique identifier)
        - class="red bg-yellow" (multiple classes for styling)
    -->
    <div id="firstdiv" class="red bg-yellow">First</div>

    <!-- 
        A div element with:
        - id="seconddiv" (unique identifier)
        - no class applied
    -->
    <div id="seconddiv">Second</div>

    <!-- 
        A span element with:
        - class="red" (used for styling)
        - no content inside yet
    -->
    <span class="red"></span>
  </body>
</html>
