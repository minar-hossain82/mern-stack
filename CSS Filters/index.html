<!DOCTYPE html>
<!-- Defines the document as HTML5 -->
<html lang="en">
  <!-- Sets page language to English -->
  <head>
    <meta charset="UTF-8" />
    <!-- Character encoding set to UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Enables responsive layout on mobile devices -->
    <title>CSS Filters</title>

    <style>
      /* Example blur filter (currently commented out)
        img{
            filter: blur(10px);
        } */

      /* Applies a brightness filter: 122% makes the image slightly brighter */
      .img1 {
        filter: brightness(122%);
      }

      /* No filter applied to the second image */
      .img2 {
      }

      /* Converts the third image to 20% grayscale (slightly desaturated) */
      .img3 {
        filter: grayscale(20%);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- First image with brightness filter -->
      <img
        class="img1"
        src="https://img.freepik.com/free-photo/programming-background-with-person-working-with-codes-computer_23-2150010125.jpg?size=626&ext=jpg"
        alt=""
      />

      <!-- Second image with no filter applied -->
      <img
        class="img2"
        src="https://c.ndtvimg.com/2023-09/154fgjlg_shah-rukh-khan-_625x300_23_September_23.jpg"
        alt=""
      />

      <!-- Third image with grayscale filter -->
      <img
        class="img3"
        src="https://images.hindustantimes.com/img/2022/11/12/550x309/akshay_kumar_1659860706633_1668255913307_1668255913307.jpg"
        alt=""
      />
    </div>
  </body>
</html>
