<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Sets the character encoding to UTF-8 so the webpage can display any text correctly -->
    <meta charset="UTF-8" />

    <!-- Ensures the website is responsive on all devices by controlling the viewport scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title of the webpage shown in the browser tab -->
    <title>Document</title>
  </head>
  <body>
    <!-- Linking an external JavaScript file named script.js -->
    <script src="script.js"></script>
  </body>
</html>
