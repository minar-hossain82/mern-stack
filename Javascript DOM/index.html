<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Sets character encoding for the page -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Makes page responsive -->
    <title>Document</title>

    <style>
      .box {
        height: 45px; /* Height of each box */
        width: 56px; /* Width of each box */
        border: 2px solid black; /* Box border */
        margin: 5px; /* Space around each box */
        padding: 5px; /* Space inside the box */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Main container holding all boxes -->

      <!-- Single box elements -->
      <div class="box">Box1</div>
      <div class="box">Box2</div>
      <div class="box">Box3</div>
      <div class="box">Box4</div>
      <div class="box">Box5</div>
    </div>

    <!-- Simple table with two columns -->
    <table>
      <tr>
        <th>Name</th>
        <!-- Table header -->
        <th>Age</th>
        <!-- Table header -->
      </tr>

      <tr>
        <td>Harry</td>
        <!-- Table data -->
        <td>100</td>
        <!-- Table data -->
      </tr>
    </table>

    <!-- External JavaScript file -->
    <script src="script.js"></script>
  </body>
</html>
