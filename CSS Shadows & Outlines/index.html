<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      /* Styling for the box container */
      .box {
        border: 2px solid black; /* Adds a black border around the box */
        padding: 34px; /* Adds spacing inside the box */
        box-shadow: 5px 15px 5px #70a711; /* Creates a shadow effect behind the box */
      }

      /* Styling for the text paragraph with shadow */
      .text-element {
        text-shadow: 10px 5px 3px #e695f7; /* Adds a purple-colored text shadow */
      }
    </style>
  </head>
  <body>
    <!-- A simple box with border, padding and shadow -->
    <div class="box">I am a box</div>

    <!-- Paragraph with text shadow effect -->
    <p class="text-element">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Architecto,
      atque. Modi voluptatibus necessitatibus architecto quidem sit maiores, ad
      nesciunt et odit esse. Possimus, ipsam et molestiae eius quae nisi
      quisquam maiores fugiat aut fuga!
    </p>
  </body>
</html>
