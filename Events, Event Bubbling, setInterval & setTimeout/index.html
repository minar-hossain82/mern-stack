<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Defines character encoding for the document -->
    <meta charset="UTF-8" />

    <!-- Makes the page responsive on different screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title shown on the browser tab -->
    <title>Document</title>
  </head>
  <body>
    <!-- Main container that wraps the content -->
    <div class="container">
      <!-- Box element whose content may be changed using JavaScript -->
      <div class="box">Hey I am a box</div>
    </div>

    <!-- Button that will trigger a JavaScript action -->
    <button id="btn">Change Content</button>

    <!-- External JavaScript file linked to handle button click or DOM changes -->
    <script src="script.js"></script>
  </body>
</html>
