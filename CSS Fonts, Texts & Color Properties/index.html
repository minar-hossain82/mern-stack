<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typography Demo</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Baloo Bhai 2", sans-serif;
        line-height: 1.6;
        padding: 40px;
      }

      h1 {
        font-family:
          "Poppins", "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
        margin-bottom: 10px;
      }

      h2 {
        text-align: center;
        text-transform: uppercase;
        text-decoration: underline;
        text-decoration-color: blue;
        text-decoration-thickness: 4px;
        margin-bottom: 20px;
      }

      p {
        font-size: 20px;
        margin-bottom: 20px;
      }

      .lorem {
        border: 2px solid red;
        width: 180px;
        padding: 10px;
        word-break: break-word;
      }
    </style>
  </head>

  <body>
    <main>
      <h1>Fonts</h1>
      <h2>About Fonts</h2>

      <p>This is a demonstration of using custom fonts in CSS.</p>

      <p class="lorem">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Quos sequi
        accusamus quas itaque molestias dolorem quisquam quod, adipisci maxime
        dolore, mollitia illo officia deserunt voluptatem iure qui.
      </p>
    </main>
  </body>
</html>
