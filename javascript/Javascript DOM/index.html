<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boxes and Table</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        padding: 20px;
        font-family: Arial, sans-serif;
      }

      .container {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .box {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 45px;
        padding: 5px;
        border: 2px solid #000;
      }

      table {
        width: 200px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 8px;
        text-align: left;
        border: 1px solid #000;
      }

      th {
        background-color: #f2f2f2;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="box">Box1</div>
        <div class="box">Box2</div>
        <div class="box">Box3</div>
        <div class="box">Box4</div>
        <div class="box">Box5</div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Age</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Harry</td>
            <td>100</td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
