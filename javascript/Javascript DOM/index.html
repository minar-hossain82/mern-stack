<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boxes & Table</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .container {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .box {
        height: 45px;
        width: 56px;
        border: 2px solid black;
        padding: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      table {
        border-collapse: collapse;
        width: 200px;
      }

      th,
      td {
        border: 1px solid black;
        padding: 8px;
        text-align: left;
      }

      th {
        background-color: #f2f2f2;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="box">Box1</div>
      <div class="box">Box2</div>
      <div class="box">Box3</div>
      <div class="box">Box4</div>
      <div class="box">Box5</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Age</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Harry</td>
          <td>100</td>
        </tr>
      </tbody>
    </table>

    <script src="script.js"></script>
  </body>
</html>
