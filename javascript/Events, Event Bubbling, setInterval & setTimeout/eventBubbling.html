<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Bubbling Demo</title>

    <style>
      .container {
        background-color: rgb(227, 227, 28);
        padding: 14px;
        margin: 14px;
      }

      .childContainer {
        background-color: beige;
        padding: 14px;
        margin: 14px;
      }

      .child {
        background-color: aliceblue;
        border: 2px solid black;
        padding: 14px;
        margin: 14px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <section class="childContainer">
        <div class="child">I am a child</div>
      </section>
    </div>

    <script>
      const child = document.querySelector(".child");
      const childContainer = document.querySelector(".childContainer");
      const container = document.querySelector(".container");

      child.addEventListener("click", (e) => {
        e.stopPropagation();
        alert("Child was clicked");
      });

      childContainer.addEventListener("click", (e) => {
        e.stopPropagation();
        alert("ChildContainer was clicked");
      });

      container.addEventListener("click", () => {
        alert("Container was clicked");
      });

      const getRandomColor = () => {
        const r = Math.floor(Math.random() * 256);
        const g = Math.floor(Math.random() * 256);
        const b = Math.floor(Math.random() * 256);
        return `rgb(${r}, ${g}, ${b})`;
      };

      const timeoutId = setTimeout(() => {
        childContainer.style.background = getRandomColor();
      }, 5000);

      console.log(timeoutId);
    </script>
  </body>
</html>
