<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Bubbling Demo</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .container {
        background-color: rgb(227, 227, 28);
        padding: 14px;
        margin: 14px;
      }

      .child-container {
        background-color: beige;
        padding: 14px;
        margin: 14px;
      }

      .child {
        background-color: aliceblue;
        border: 2px solid black;
        padding: 14px;
        margin: 14px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <section class="child-container">
        <div class="child">I am a child</div>
      </section>
    </div>

    <script>
      const child = document.querySelector(".child");
      const childContainer = document.querySelector(".child-container");
      const container = document.querySelector(".container");

      child.addEventListener("click", (event) => {
        event.stopPropagation();
        alert("Child was clicked");
      });

      childContainer.addEventListener("click", (event) => {
        event.stopPropagation();
        alert("Child container was clicked");
      });

      container.addEventListener("click", () => {
        alert("Container was clicked");
      });

      const getRandomColor = () => {
        const r = Math.floor(Math.random() * 256);
        const g = Math.floor(Math.random() * 256);
        const b = Math.floor(Math.random() * 256);

        return `rgb(${r}, ${g}, ${b})`;
      };

      const timeoutId = setTimeout(() => {
        childContainer.style.backgroundColor = getRandomColor();
      }, 5000);

      console.log("Timeout ID:", timeoutId);
    </script>
  </body>
</html>
