<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Layout</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 20px;
      }

      .box {
        height: 34px;
        width: 34px;
        margin: 10px;
        padding: 10px;
        border: 2px solid black;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        text-align: center;
      }

      #redbox {
        background-color: red;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="box">Bhupendra Jogi 1</div>
      <div class="box">Bhupendra Jogi 1.5</div>
      <div class="box">Bhupendra Jogi 2</div>
      <div id="redbox" class="box">Bhupendra Jogi 2.5</div>
      <div class="box">Bhupendra Jogi 3</div>
      <div class="box">Bhupendra Jogi 4</div>
      <div class="box">Bhupendra Jogi 5</div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
