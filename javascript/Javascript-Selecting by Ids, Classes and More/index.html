<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Layout</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 20px;
      }

      .box {
        width: 80px;
        height: 80px;
        border: 2px solid #000;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 10px;
        padding: 5px;
      }

      .highlight {
        background-color: red;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">Bhupendra Jogi 1</div>
      <div class="box">Bhupendra Jogi 1.5</div>
      <div class="box">Bhupendra Jogi 2</div>
      <div class="box highlight">Bhupendra Jogi 2.5</div>
      <div class="box">Bhupendra Jogi 3</div>
      <div class="box">Bhupendra Jogi 4</div>
      <div class="box">Bhupendra Jogi 5</div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
