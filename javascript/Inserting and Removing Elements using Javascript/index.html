<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insert Adjacent HTML Demo</title>

    <style>
      .red {
        color: red;
      }

      .bg-green {
        background-color: lightgreen;
        padding: 10px;
      }

      .box {
        margin: 10px 0;
      }
    </style>
  </head>

  <body>
    <div class="container red bg-green">
      <div
        class="box"
        style="display: flex"
        data-createdby="harry"
        data-conceptby="rohan"
      >
        Hey I am a box
      </div>

      <div class="box">Hey I am a box</div>
    </div>

    <script>
      const container = document.querySelector(".container");

      container.insertAdjacentHTML(
        "beforebegin",
        "<b>I am under the water. Please help me here, too much raining... </b>",
      );
    </script>
  </body>
</html>
