<!DOCTYPE html>
<!-- Defines the document type as HTML5 -->

<html lang="en">
  <!-- Root element of the HTML document, language set to English -->

  <head>
    <!-- Contains meta information about the webpage -->

    <meta charset="UTF-8" />
    <!-- Sets character encoding to UTF-8 to support all characters -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Makes the website responsive on all devices -->

    <title>Document</title>
    <!-- Title of the webpage shown in the browser tab -->
  </head>

  <body>
    <!-- Main content of the webpage -->

    <script src="index.js"></script>
    <!-- Links the external JavaScript file -->
  </body>
</html>
