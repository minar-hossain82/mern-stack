<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Sets character encoding for the document -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Makes layout responsive on all devices -->
    <title>CSS object Fit and position</title>
    <!-- Title of the webpage -->

    <style>
      .container {
        height: 488px; /* Fixed height for the container */
        width: 466px; /* Fixed width for the container */
        border: 2px solid black; /* Adds a black border around the container */

        /* Background image settings */
        background-position: center center; /* Centers the background image horizontally and vertically */
        background-clip: border-box; /* Ensures background stays within the border */

        background-image: url("https://us.123rf.com/450wm/progressman/progressman1909/progressman190900115/130695651-woman-in-black-coat-walking-along-the-sea.jpg?ver=6"); /* Applies background image */
        background-repeat: no-repeat; /* Prevents image from repeating */
      }

      img {
        width: 466px; /* Matches container width */
        height: 488px; /* Matches container height */

        object-fit: contain; /* Ensures entire image is visible while maintaining aspect ratio */
        /* object-fit: fill;  Stretches image to fill box (may distort) */

        object-position: 10px 20px; /* Adjusts visible portion of the image inside the box */
        /* object-position: bottom right;  Moves image to bottom-right corner */
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- Image intentionally removed to show background image on container -->
      <!-- <img src="https://images.unsplash.com/photo-1575936123452-b67c3203c357?q=80&w=1000&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8aW1hZ2V8ZW58MHx8MHx8fDA%3D" alt="Sample image"> -->
    </div>
  </body>
</html>
